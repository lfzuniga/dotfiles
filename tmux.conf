# remapping the Ctrl B key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# reloading this file fairly easily
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# To be able to use my vim celor in Grace cluster. This is for tmux 2.7.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:Tc"

# Customization for STATUS BAR
set-option -g allow-rename off #don't rename the windows automatically
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=green'
set -g status-left ' '
set -g status-left-length 10

set -g status-right-style 'fg=green bg=default'
set -g status-right ' [#S] '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=green'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=green bg=default'
setw -g window-status-format ' #I #[fg=default]#W #[fg=default]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# switch panes with Option/Alt + arrows (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# resize panes with Option/Alt + Shift + arrows (no prefix)
bind -n M-S-Left  resize-pane -L
bind -n M-S-Down  resize-pane -D
bind -n M-S-Up    resize-pane -U
bind -n M-S-Right resize-pane -R

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


